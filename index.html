<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snap Scrolling Sections</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="mobile.css">
  <link rel="stylesheet" href="form.css">
  <link rel="stylesheet" href="borders.css">
  <link rel="stylesheet" href="selector.css">

  <script src="script.js"></script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton+SC&family=Poppins&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet" />
</head>

<body>
  <script>

    //send button delay
    window.addEventListener("DOMContentLoaded", function () {
      const yourForm = document.getElementById("myForm");
      const submitButton = document.getElementById("submitButton");

      yourForm.addEventListener("submit", function (e) {
        e.preventDefault();

        // Change button text and disable it
        submitButton.textContent = "Sending...";
        submitButton.disabled = true;

        const data = new FormData(yourForm);
        const action = e.target.action;

        fetch(action, {
          method: "POST",
          body: data,
        })
          .then(() => {
            window.location.replace("thankyou.html");
          })
          .catch(() => {
            // Handle the error (e.g., show an error message)
            submitButton.textContent = "Send";
            submitButton.disabled = false;
          });
      });
    });
  </script>
  
  <div class="top-right-image">
    <img src="topblob.svg" alt="Top Right Image" />
  </div>
  <div class="bottom-left-image">
    <img src="bottomblob.svg" alt="Bottom Left Image" />
  </div>

  <section class="section section1">
    <div class="content">
      <div class="main-title">FLØYEN</div>
      <div class="main-subtitle">BY PILAR SANCHEZ YUN</div>
    </div>
    </div>
  </section>

  <section class="section section2">
    <div class="content">
      <div class="image-container">
        <img src="cover2.png" alt="Book Cover 1" class="cover-image" />
        <img src="cover2.png" alt="Book Cover 2" class="cover-image" />
      </div>
      <div class="subtitle">
        xxpp. xxlb pages. xxxlb cover.
        <br>$$$$ (dkk/euro) + shipping.
      </div>
    </div>
  </section>

  <section class="section section3">
    <div class="subtitle">
      Instructions and information on filling out the form goes here.
    </div>
    <div class="content form-container">
        <form
          method="POST"
          action="https://script.google.com/macros/s/AKfycbzf1HzLtv0eQOHrW9OjP-R0ATYokBj605M9145iW9W4aY4Y8GrOQ9lYJKc10SppPVAf/exec"
          id="myForm"
          class="floating-form"
        >
          <label for="Name">name:</label>
          <input
            name="Name"
            type="text"
            placeholder="full name"
            required
            aria-label="Name"
          />

          <label for="Email">e-mail:</label
          ><input
            name="Email"
            type="email"
            placeholder="e-mail"
            required
            aria-label="Email"
          />

          <label for="PhoneNumber">phone number:</label>
          <input
            style="margin-bottom: 10px"
            name="PhoneNumber"
            id="PhoneNumber"
            type="tel"
            aria-label="Phone Number"
            placeholder="phone number"
          />

          <label for="PaymentType">are you located in denmark?</label>
          <select
            name="PaymentType"
            id="PaymentType"
            required
            onchange="togglePaymentField()"
            aria-label="Payment Type"
          >
            <option value="" disabled selected hidden>
              are you located in denmark?
            </option>
            <option value="yes">yes, i am located in denmark.</option>
            <option value="no">no, i am located outside of denmark.</option>
          </select>

          <div id="paymentField" style="display: none">
            <div id="formNote">The shipping cost will be BLANK.</div>
          </div>

          <div id="shippingAddressField">
            <label for="ShippingAddress">shipping address:</label>
            <input
              name="Address"
              type="text"
              id="shippingAddressInput"
              placeholder="enter your address..."
              aria-label="Shipping Address"
            />
          </div>

          <label for="Note">note:</label>
          <textarea
            name="Note"
            id="Note"
            placeholder="add a note... (optional)"
            aria-label="Note"
          ></textarea>

          <button type="submit" id="submitButton">send</button>
      </form>
    </div>
  </section>

  <section class="section section4">
    <div class="content">
      <div class="title">PROJECT TYPE</div>
      <div class="subtitle">
        Description or content about the project type.
      </div>
    </div>
  </section>
  <script>
    // Initialize intl-tel-input
    document.addEventListener("DOMContentLoaded", function () {
      var phoneNumberInput = document.getElementById("PhoneNumber");
      var iti = window.intlTelInput(phoneNumberInput, {
        separateDialCode: true,
        preferredCountries: ["dk", "es"],
        utilsScript:
          "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/utils.js",
      });
    });
  </script>
</body>

</html>
